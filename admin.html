<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alpha VCFS - Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root{--bg:#0b0f0b;--card:#121812;--text:#d0d0d0;--head:#fff;--sub:#8b9a8b;--bor:#1f2a1f;--inp-bg:#0a0f0a;--inp-txt:#fff;--btn:#4ade80;--btn-txt:#000}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center;min-height:100vh;padding:20px}
  .container{max-width:700px;width:100%}
  .card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:20px;margin-bottom:20px}
  input,select,button{width:100%;padding:12px;margin:8px 0;background:var(--inp-bg);border:1px solid var(--bor);color:var(--inp-txt);font-size:1rem;border-radius:8px;outline:none}
  button{background:var(--btn);color:var(--btn-txt);font-weight:600;cursor:pointer}
  button:hover{filter:brightness(1.1)}
  .hidden{display:none}
  .warn{color:#f0f;margin-top:5px}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{padding:10px;text-align:left;border-bottom:1px solid var(--bor);font-size:0.9rem}
  th{color:var(--btn)}
  .btn-sm{padding:6px 10px;font-size:0.8rem;width:auto;background:var(--btn);color:var(--btn-txt);border:none;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div class="container" id="loginContainer">
  <div class="card">
    <h2>Admin Login</h2>
    <input type="email" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
    <p id="loginMsg" class="warn"></p>
  </div>
</div>

<div class="container hidden" id="adminContainer">
  <div class="card">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()" style="background:#f0f;color:#fff;">Logout</button>
  </div>
  <div class="card">
    <h3>All User Requests</h3>
    <table id="requestsTable">
      <thead><tr><th>User</th><th>Session Name</th><th>Target</th><th>WhatsApp</th><th>Status</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQwmSD9lc6A0G-AhGBMCBayhM4Ox-jcEs",
    authDomain: "status-views-boost.firebaseapp.com",
    projectId: "status-views-boost",
    storageBucket: "status-views-boost.firebasestorage.app",
    messagingSenderId: "497892708994",
    appId: "1:497892708994:web:a169130977e576f0915a9b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const ADMIN_EMAIL = "alexiomhungu9@gmail.com";

  window.adminLogin = async () => {
    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;
    const msg = document.getElementById("loginMsg");
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) { msg.textContent = e.message; }
  };

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById("loginContainer").classList.add("hidden");
      document.getElementById("adminContainer").classList.remove("hidden");
      loadAllRequests();
    } else {
      document.getElementById("loginContainer").classList.remove("hidden");
      document.getElementById("adminContainer").classList.add("hidden");
    }
  });

  async function loadAllRequests() {
    const usersRef = ref(db, 'users');
    const usersSnap = await get(usersRef);
    if (!usersSnap.exists()) return;
    const users = usersSnap.val();
    const tbody = document.querySelector('#requestsTable tbody');
    tbody.innerHTML = '';
    for (const [uid, userData] of Object.entries(users)) {
      if (userData.requests) {
        for (const [rid, req] of Object.entries(userData.requests)) {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${userData.email || uid}</td>
            <td>${req.name}</td>
            <td>${req.target}</td>
            <td><a href="${req.groupLink}" target="_blank">Link</a></td>
            <td>${req.status}</td>
            <td><button class="btn-sm" onclick="copyRequest('${req.name}','${req.target}','${req.groupLink}','${userData.email || uid}')">Copy Info</button></td>
          `;
        }
      }
    }
  }

  window.copyRequest = (name, target, groupLink, email) => {
    const info = `Session: ${name}\nTarget: ${target}\nWhatsApp Group: ${groupLink}\nUser Email: ${email}`;
    navigator.clipboard.writeText(info).then(() => alert("Request details copied! Create the session manually and send the link to the user."));
  };
</script>
</body>
</html>
